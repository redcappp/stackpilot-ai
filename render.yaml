services:
  - type: web
    name: stackpilot-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: OPENAI_MODEL
        value: gpt-5.6
      - key: OPENAI_API_KEY
        sync: false
